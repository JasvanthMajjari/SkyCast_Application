<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyCast</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <link rel="shortcut icon" href="public/images/favicon.ico" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body class="container-fluid">
    <div class="main-heading">
      <h1 class="heading">🌤️&nbsp;&nbsp;&nbsp;SkyCast&nbsp;&nbsp;&nbsp;🌤️</h1>
      <marquee alternate="left">
        <span
          >&nbsp; It is Weather casting App...Track the weather. Stay prepared.
          Live smarter. &nbsp;</span
        >
      </marquee>
    </div>
    <div class="card">
      <div class="input-group mb-3">
        <input
          type="text"
          placeholder="Enter cityname"
          spellcheck="false"
          id="txtCity"
          class="form-control"
        />
        <button class="btn btn-success" id="searchBtn">
          <i class="bi bi-search"></i>
        </button>
      </div>
      <div class="error">
        <p>Invalid City Name</p>
      </div>
      <div class="weather">
        <img src="./public/images/rain.png" class="weather-icon" />
        <h1 class="temp" id="temperature">22°C</h1>
        <h2 class="city" id="lblCity">Bengaluru</h2>
        <div class="details">
          <div class="col">
            <img src="./public/images/humidity.png" />
            <div>
              <p class="humidity" id="lblHumidity">50%</p>
              <p>humidity</p>
            </div>
          </div>
          <div class="col">
            <img src="./public/images/wind.png" />
            <div>
              <p class="wind" id="lblSpeed">15 km/h</p>
              <p>Wind Speed</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./src/script.js"></script>
  </body>
</html>
