<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyCast</title>
  <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
  <link rel="shortcut icon" href="./public/images/favicon.ico">
  <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body class="container-fluid">
  <div class="main-heading">
    <h1 class="heading"> 🌤️&nbsp;&nbsp;&nbsp;SkyCast&nbsp;&nbsp;&nbsp;🌤️</h1>
    <marquee alternate="left"><span>&nbsp; It is Weather casting App...Track the weather. Stay prepared. Live smarter. &nbsp;</span></marquee>
  </div>
  <div class="card">
    <div class="input-group">
      <input type="text" placeholder="Enter cityname" spellcheck="false" id="txtCity" class="form-control">
      <button class="btn btn-success bi bi-search" id="searchBtn"></button>
    </div>
    <div class="error">
      <p>Invalid City Name </p>
    </div>
    <div class="weather">
      <img src="./public/images/rain.png" class="weather-icon">
      <h1 class="temp" id="temperature">22°C</h1>
      <h2 class="city" id="lblCity">Bengaluru</h2>
      <div class="details">
        <div class="col">
          <img src="./public/images/humidity.png">
          <div>
            <p class="humidity" id="lblHumidity">50%</p>
            <p>humidity</p>
          </div>
        </div>
        <div class="col">
          <img src="./public/images/wind.png">
          <div>
            <p class="wind" id="lblSpeed">15 km/h</p>
            <p>Wind Speed</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./src/script.js"></script>
</body>
</html>
